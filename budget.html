<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracking</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/budget.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <header class="header">
        <div class="header-left">
            <button class="sidebar-toggle" id="sidebarToggle">☰</button>
        </div>
        <div class="header-center">
            <h1 class="page-title" id="pageTitle">Budget</h1>
        </div>
        <div class="header-right">
            <label class="switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
        </div>
    </header>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Menu</h2>
            <button class="sidebar-close" id="sidebarClose">✕</button>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="budget.html">Budget</a></li>
            <li><a href="reports.html">Reports</a></li>
         
        </ul>
    </nav>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
    <section class="budget-section">
        <div class="card-container">
            
            <div class="table-container">
                
                <div class="table-header">
                    <h2>Monthly Budgets</h2>
                    <button class="addBtn">Add Category</button>
                </div>

                <table class="budget-table">
                    <thead>
                        <tr>
                            <th>Category</th>
                            <th>Allocated</th>
                            <th>Spent</th>
                            <th>Remaining</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td><strong>Rent & Housing</strong></td>
                            <td>₱15,000.00</td>
                            <td>₱15,000.00</td>
                            <td class="text-muted">₱0.00</td>
                        </tr>
                        <tr>
                            <td><strong>Food & Groceries</strong></td>
                            <td>₱12,000.00</td>
                            <td>₱8,450.00</td>
                            <td class="text-success">₱3,550.00</td>
                        </tr>
                        <tr>
                            <td><strong>Utilities & Bills</strong></td>
                            <td>₱5,000.00</td>
                            <td>₱5,800.00</td>
                            <td class="text-danger">-₱800.00</td>
                        </tr>
                        <tr>
                            <td><strong>Entertainment</strong></td>
                            <td>₱3,000.00</td>
                            <td>₱1,200.00</td>
                            <td class="text-success">₱1,800.00</td>
                        </tr>
                    </tbody>
                </table>

            </div>
            
        </div>
    </section>
</main>
    <script src="js/global.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
