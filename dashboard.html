<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracking</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <header class="header">
        <div class="header-left">
            <button class="sidebar-toggle" id="sidebarToggle">☰</button>
        </div>
        <div class="header-center">
            <h1 class="page-title" id="pageTitle">Dashboard</h1>
        </div>
        <div class="header-right">
            <label class="switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span> 
            </label>
        </div>
    </header>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Menu</h2>
            <button class="sidebar-close" id="sidebarClose">✕</button>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="budget.html">Budget</a></li>
            <li><a href="reports.html">Reports</a></li>
        </ul>
    </nav>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
        <section class="dashboard-section">
            <div class="card-container">

                <div class="card-container">

                    <div class="card" id="balanceCard">
                        <h3>Balance</h3>
                        <p class="value">3,000</p>
                    </div>
                    <div class="card" id="incomeCard">
                        <h3>Income</h3>
                        <p class="value">10,000</p>
                    </div>
                    <div class="card" id="expensesCard">
                        <h3>Expenses</h3>
                        <p class="value">7,000</p>
                    </div>
                

                <div class="card" id="transactionCard">
                    <h3>Last Transactions</h3>
                    
                </div>

                <div class="card" id="chartCard">
                    <h3>Chart</h3>
                    
                </div>
            </div>
        </div>
        </section>
    </main>
    <script src="js/global.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
